name: Build and deploy fzap-evo-bridge

on:
  push:
    branches: [main]
    paths:
      - 'fzap-evo-bridge/**'
      - '.github/workflows/build-bridge.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/luizglopesx/fzap-evo-bridge

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./fzap-evo-bridge
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Portainer redeploy
        env:
          WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "PORTAINER_WEBHOOK_URL secret is not set — skipping redeploy."
            echo "Set it under repo Settings -> Secrets and variables -> Actions."
            exit 0
          fi
          echo "Calling Portainer webhook..."
          curl -fsSL -X POST "$WEBHOOK"
          echo "Webhook call ok."
