version: "3.8"

services:
  bridge:
    image: node:20-alpine
    command: ["node", "/app/bridge.js"]
    environment:
      PORT: "3000"
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      EVO_BASE_URL: http://chat_crm_evo_crm:3000
      EVO_API_TOKEN: ${EVO_API_TOKEN}
      EVO_INBOX_IDENTIFIER: fzap_whatsapp
      WUZAPI_BASE_URL: https://wuzapi.senhorcolchao.com
      FZAP_CHANNELS_JSON: ${FZAP_CHANNELS_JSON}
    configs:
      - source: bridge_app
        target: /app/bridge.js
    networks:
      - network_public
      - chat_crm_evo_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == manager1
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_public
        - traefik.http.routers.fzap-evo-bridge.rule=Host(`chat.senhorcolchao.com`) && PathPrefix(`/fzap`)
        - traefik.http.routers.fzap-evo-bridge.entrypoints=websecure
        - traefik.http.routers.fzap-evo-bridge.tls.certresolver=letsencryptresolver
        - traefik.http.routers.fzap-evo-bridge.priority=300
        - traefik.http.routers.fzap-evo-bridge.service=fzap-evo-bridge
        - traefik.http.services.fzap-evo-bridge.loadbalancer.server.port=3000
        - traefik.http.services.fzap-evo-bridge.loadbalancer.passHostHeader=true

configs:
  bridge_app:
    file: ./fzap-evo-bridge/bridge.js

networks:
  network_public:
    external: true
    name: network_public
  chat_crm_evo_internal:
    external: true
    name: chat_crm_evo_internal

